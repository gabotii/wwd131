<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Dynamic Web Fundamentals - Gabriel Torrejon</title>
    <meta name="description" content="WDD 131 - Dynamic Web Fundamentals - Gabriel Torrejon">
    <meta name="author" content="Gabriel Torrejon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/places.css">
    <script defer src="scripts/scripts.js"></script>
</head>

<body>
    <header>
        <h1>Chile</h1>
    </header>
    <div class="blank"></div>
    <main>
        <picture class="hero">
            <source srcset="images/hero-large.webp" media="(min-width: 640px)">
            <img src="images/hero-small.webp" alt="Temple name and location" width="500" height="250">
        </picture>
        <section class="sec data">
            <h2>Data</h2>
            <p><strong>Area:</strong> 756,102 km² </p>
            <p>Capital: Santiago</p>
            <p>Languages: Spanish</p>
            <p>Currency: Chilean Peso (CLP)</p>
            <p>Time zone: CLT, UTC -3</p>
            <p>Calling code: +56</p>
            <p>Internet TLD: .cl</p> 
        </section>

        <section class="sec weather">
            <h2>Weather <span><img src="images/weather-icon.svg" alt="weather icon"></span>
            </h2>
            <p><strong>Tempreature:</strong> <span id="temp">10°C</span> 
            <p><strong>Conditions:</strong> Partly cloudy </p>
            <p><strong>Wind:</strong> <span id="wind">5</span> km/h</p>
            <p><strong>Wind Chill:</strong> <span id="windFactor"></span></p>
        </section>
    </main>

    <footer>
        <p><span id="currentyear"></span> Gabriel Torrejon, Chile</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
